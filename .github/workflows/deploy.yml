name: Deploy Mediconnect

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2️⃣ Activation SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << EOF
          Host ${{ vars.SERVER_HOST }}
            HostName ${{ vars.SERVER_HOST }}
            User ${{ vars.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      # 3️⃣ Déploiement Laravel (sans vendor, storage, .env)
      - name: Deploy Laravel backend
        run: |
          rsync -avz --delete \
            -e 'ssh -i ~/.ssh/deploy_key' \
            --exclude 'vendor/' \
            --exclude 'storage/' \
            --exclude '.env' \
            backend/laravel/ \
            ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:/var/www/Mediconnect/backend/laravel/

      # 4️⃣ Optimisation Laravel
      - name: Optimize Laravel
        run: |
          ssh -i ~/.ssh/deploy_key ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }} "cd /var/www/Mediconnect/backend/laravel && php artisan optimize"

      # 4️⃣.5️⃣ Build React frontend
      - name: Build React frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 5️⃣ Déploiement React (sans dist, node_modules)
      - name: Deploy React frontend
        run: |
          rsync -avz --delete \
            -e 'ssh -i ~/.ssh/deploy_key' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            frontend/ \
            ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:/var/www/Mediconnect/frontend/
